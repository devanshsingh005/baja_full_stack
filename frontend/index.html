<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BFHL Node Explorer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&display=swap');

    :root {
      --bg: #F5F0E8;
      --bg-card: #FDFAF4;
      --bg-input: #F0EBE0;
      --border: #D4C9B0;
      --border-strong: #A89880;

      --ink: #1A1714;
      --ink-muted: #6B5F52;
      --ink-faint: #A89880;

      --accent-green: #2D6A4F;
      --accent-red: #8B2E2E;
      --accent-amber: #8B6914;
      --accent-blue: #1D3E6B;

      --accent-green-bg: #EAF4EE;
      --accent-red-bg: #F4EAEA;
      --accent-amber-bg: #F4F0E0;
      --accent-blue-bg: #EAF0F4;

      --node-fill: #FDFAF4;
      --node-stroke: #1A1714;
      --node-root: #1D3E6B;
      --node-cycle: #8B2E2E;
      --edge-stroke: #6B5F52;

      --font-display: 'DM Serif Display', serif;
      --font-mono: 'DM Mono', monospace;

      --text-xs: 0.7rem;
      --text-sm: 0.8rem;
      --text-base: 0.95rem;
      --text-lg: 1.1rem;
      --text-xl: 1.4rem;
      --text-2xl: 2rem;
      --text-3xl: 3rem;

      --radius: 14px;
      --shadow-soft: 0 10px 24px rgba(26, 23, 20, 0.08);
      --shadow-raise: 0 14px 28px rgba(26, 23, 20, 0.12);
    }

    * {
      box-sizing: border-box;
      transition: all 150ms ease;
    }

    *::-webkit-scrollbar {
      height: 8px;
      width: 8px;
    }

    *::-webkit-scrollbar-track {
      background: var(--border);
      border-radius: 999px;
    }

    *::-webkit-scrollbar-thumb {
      background: var(--ink-muted);
      border-radius: 999px;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #f7f2ea 0%, var(--bg) 100%);
      color: var(--ink);
      min-height: 100%;
      font-family: var(--font-mono);
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 26px 22px 34px;
    }

    .header {
      opacity: 0;
      transform: translateY(6px);
      animation: fadeInUp 400ms ease forwards;
    }

    .title {
      margin: 0;
      font-family: var(--font-display);
      font-size: 2.5rem;
      line-height: 1;
      color: var(--ink);
      letter-spacing: 0.01em;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 0.75rem;
      color: var(--ink-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeInUp 320ms ease 200ms forwards;
    }

    .header-rule {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 14px 0 18px;
    }

    .input-panel {
      background: var(--bg-input);
      border: 1.5px solid var(--border-strong);
      border-radius: var(--radius);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35), var(--shadow-soft);
      overflow: hidden;
      opacity: 0;
      animation: fadeIn 420ms ease 400ms forwards;
    }

    .input-top-strip {
      height: 3px;
      background: var(--accent-blue);
    }

    .input-content {
      padding: 14px 16px 16px;
    }

    .input-label {
      font-size: var(--text-sm);
      color: var(--ink-muted);
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    .chip-area {
      min-height: 88px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      display: flex;
      align-items: flex-start;
      align-content: flex-start;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: var(--text-sm);
      border: 1px solid;
      animation: chipIn 150ms ease;
    }

    .chip-valid {
      background: var(--accent-green-bg);
      border-color: var(--accent-green);
      color: var(--accent-green);
    }

    .chip-invalid {
      background: var(--accent-red-bg);
      border-color: var(--accent-red);
      color: var(--accent-red);
    }

    .chip-duplicate {
      background: var(--accent-amber-bg);
      border-color: var(--accent-amber);
      color: var(--accent-amber);
    }

    .chip-remove {
      border: 0;
      background: transparent;
      color: inherit;
      opacity: 0.6;
      cursor: pointer;
      font-size: var(--text-sm);
      line-height: 1;
      padding: 0;
    }

    .chip-remove:hover {
      opacity: 1;
    }

    .edge-input {
      flex: 1;
      min-width: 220px;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--ink);
      font-family: var(--font-mono);
      font-size: var(--text-base);
      padding: 4px 2px;
    }

    .edge-input::placeholder {
      color: var(--ink-faint);
    }

    .edge-input:focus {
      outline: 2px solid var(--accent-blue);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .action-row {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      border: 1px solid var(--border-strong);
      background: var(--bg-card);
      color: var(--ink);
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      letter-spacing: 0.02em;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-soft);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-secondary {
      background: transparent;
    }

    .btn-clear {
      border: 0;
      background: transparent;
      color: var(--ink-muted);
      padding: 8px 4px;
    }

    .btn-submit {
      margin-left: auto;
      background: var(--ink);
      color: var(--bg);
      border-color: var(--ink);
      min-width: 130px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .spinner {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(245, 240, 232, 0.45);
      border-top-color: var(--bg);
      animation: spin 700ms linear infinite;
    }

    .results {
      margin-top: 18px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
      padding: 16px;
    }

    .results-title {
      margin: 0 0 14px;
      font-size: var(--text-sm);
      color: var(--ink-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .empty-state {
      min-height: 280px;
      display: grid;
      place-items: center;
      text-align: center;
      border: 1px dashed var(--border);
      border-radius: 12px;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 24px,
        rgba(168, 152, 128, 0.1) 24px,
        rgba(168, 152, 128, 0.1) 25px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 24px,
        rgba(168, 152, 128, 0.1) 24px,
        rgba(168, 152, 128, 0.1) 25px
      );
    }

    .empty-note {
      color: var(--ink-muted);
      font-size: var(--text-sm);
      margin-top: 10px;
    }

    .error-state {
      border: 1px solid var(--accent-red);
      background: var(--accent-red-bg);
      border-radius: 12px;
      padding: 20px;
      display: none;
    }

    .error-icon {
      font-size: 2rem;
      line-height: 1;
      color: var(--accent-red);
    }

    .error-title {
      margin: 6px 0 8px;
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      color: var(--accent-red);
    }

    .error-sub {
      color: var(--ink-muted);
      font-size: var(--text-sm);
      margin-bottom: 14px;
    }

    .result-content {
      display: none;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat-card {
      border: 1px solid var(--border);
      background: var(--bg-card);
      border-radius: 10px;
      padding: 12px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
      opacity: 0;
      transform: translateY(12px);
      animation: fadeInUp 320ms ease forwards;
    }

    .stat-value {
      margin: 0;
      font-family: var(--font-display);
      font-size: var(--text-3xl);
      line-height: 0.95;
      font-weight: normal;
    }

    .stat-label {
      margin-top: 8px;
      font-size: var(--text-sm);
      text-transform: uppercase;
      color: var(--ink-muted);
      letter-spacing: 0.08em;
    }

    .value-green {
      color: var(--accent-green);
    }

    .value-red {
      color: var(--accent-red);
    }

    .value-blue {
      color: var(--accent-blue);
    }

    .hierarchy-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 12px;
    }

    .hier-card {
      min-width: 210px;
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent-blue);
      border-radius: 10px;
      background: var(--bg-card);
      padding: 10px;
      cursor: pointer;
    }

    .hier-card.cycle {
      border-left-color: var(--accent-red);
    }

    .hier-card.selected {
      border-color: var(--accent-blue);
      box-shadow: var(--shadow-raise);
      transform: translateY(-2px);
    }

    .hier-root {
      font-size: var(--text-sm);
      color: var(--ink);
      margin: 0 0 6px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .hier-meta {
      font-size: var(--text-sm);
      color: var(--ink-muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cycle-badge-small {
      border: 1px solid var(--accent-red);
      color: var(--accent-red);
      border-radius: 999px;
      font-size: var(--text-xs);
      padding: 2px 6px;
    }

    .viz-wrap {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 24px,
        rgba(168, 152, 128, 0.08) 24px,
        rgba(168, 152, 128, 0.08) 25px
      ),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 24px,
        rgba(168, 152, 128, 0.08) 24px,
        rgba(168, 152, 128, 0.08) 25px
      ),
      var(--bg-card);
      padding: 10px;
      position: relative;
      min-height: 300px;
      overflow-x: auto;
    }

    .depth-pill {
      position: absolute;
      right: 12px;
      top: 10px;
      background: var(--accent-blue-bg);
      color: var(--accent-blue);
      border: 1px solid var(--accent-blue);
      border-radius: 999px;
      padding: 3px 9px;
      font-size: var(--text-xs);
      text-transform: lowercase;
    }

    .viz-svg {
      width: 100%;
      min-width: 300px;
      display: block;
    }

    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 14px 0 8px;
      color: var(--ink-muted);
      font-size: var(--text-sm);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .section-head::after {
      content: '';
      height: 1px;
      background: var(--border);
      flex: 1;
    }

    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      border-radius: 999px;
      padding: 4px 10px;
      font-size: var(--text-sm);
      border: 1px solid;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .pill-invalid {
      background: var(--accent-red-bg);
      color: var(--accent-red);
      border-color: var(--accent-red);
    }

    .pill-duplicate {
      background: var(--accent-amber-bg);
      color: var(--accent-amber);
      border-color: var(--accent-amber);
    }

    .json-toggle-row {
      margin-top: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .json-toggle {
      border: 0;
      background: transparent;
      color: var(--ink-muted);
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      cursor: pointer;
      padding: 0;
    }

    .json-panel {
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #f7f3ea;
      padding: 12px;
      display: none;
      max-height: 300px;
      overflow: auto;
      position: relative;
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      line-height: 1.6;
      color: var(--ink);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .json-copy {
      position: sticky;
      top: 0;
      margin-left: auto;
      display: block;
      border: 1px solid var(--border-strong);
      background: var(--bg-card);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: var(--text-xs);
      font-family: var(--font-mono);
      cursor: pointer;
    }

    .json-content {
      margin-top: 8px;
    }

    .json-key { color: var(--accent-blue); }
    .json-string { color: var(--accent-green); }
    .json-number { color: var(--accent-red); }
    .json-bool { color: var(--accent-amber); }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(26, 23, 20, 0.24);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 40;
    }

    .modal.open {
      display: flex;
    }

    .modal-card {
      width: min(620px, 100%);
      background: var(--bg-card);
      border: 1.5px solid var(--border-strong);
      border-radius: 12px;
      padding: 14px;
      box-shadow: var(--shadow-raise);
    }

    .modal-title {
      margin: 0 0 8px;
      font-size: var(--text-sm);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-muted);
    }

    .bulk-textarea {
      width: 100%;
      min-height: 170px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-input);
      color: var(--ink);
      font-family: var(--font-mono);
      font-size: var(--text-base);
      padding: 10px;
      outline: none;
    }

    .bulk-textarea:focus {
      outline: 2px solid var(--accent-blue);
      outline-offset: 2px;
    }

    .modal-actions {
      margin-top: 10px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .tooltip {
      position: fixed;
      pointer-events: none;
      background: var(--ink);
      color: var(--bg);
      border-radius: 7px;
      padding: 4px 8px;
      font-size: var(--text-xs);
      opacity: 0;
      z-index: 80;
    }

    .tooltip.show {
      opacity: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes chipIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes drawEdge {
      to { stroke-dashoffset: 0; }
    }

    @media (max-width: 768px) {
      :root {
        --text-xs: 0.63rem;
        --text-sm: 0.72rem;
        --text-base: 0.86rem;
        --text-lg: 0.99rem;
        --text-xl: 1.26rem;
        --text-2xl: 1.8rem;
        --text-3xl: 2.7rem;
      }

      .page {
        padding: 18px 14px 24px;
      }

      .title {
        font-size: 2rem;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .action-row {
        flex-direction: column;
        align-items: stretch;
      }

      .btn-submit {
        margin-left: 0;
      }

      .hier-card {
        min-width: 175px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <h1 class="title">Node Explorer</h1>
      <div class="subtitle">BFHL Challenge — Graph Hierarchy Analyzer</div>
      <hr class="header-rule" />
    </header>

    <section class="input-panel" aria-label="Edge input panel">
      <div class="input-top-strip" aria-hidden="true"></div>
      <div class="input-content">
        <div class="input-label">— Enter node edges below —</div>
        <div class="chip-area" id="chipArea">
          <input id="edgeInput" class="edge-input" placeholder="e.g. A->B, press Enter" />
        </div>
        <div class="action-row">
          <button class="btn btn-secondary" id="pasteBtn" type="button">Paste bulk ↗</button>
          <button class="btn btn-clear" id="clearBtn" type="button">Clear ×</button>
          <button class="btn btn-submit" id="analyzeBtn" type="button" disabled>Analyze →</button>
        </div>
      </div>
    </section>

    <section class="results" aria-live="polite">
      <h2 class="results-title">Results</h2>

      <div id="emptyState" class="empty-state">
        <div>
          <svg width="220" height="120" viewBox="0 0 220 120" aria-hidden="true">
            <defs>
              <marker id="emptyArrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
                <path d="M0,0 L8,4 L0,8 Z" fill="#A89880" />
              </marker>
            </defs>
            <path d="M40 55 Q75 25 110 55" stroke="#D4C9B0" stroke-width="2" fill="none" marker-end="url(#emptyArrow)" />
            <path d="M110 55 Q145 85 180 55" stroke="#D4C9B0" stroke-width="2" fill="none" marker-end="url(#emptyArrow)" />
            <circle cx="40" cy="55" r="14" fill="#FDFAF4" stroke="#A89880" stroke-width="2" />
            <circle cx="110" cy="55" r="14" fill="#FDFAF4" stroke="#A89880" stroke-width="2" />
            <circle cx="180" cy="55" r="14" fill="#FDFAF4" stroke="#A89880" stroke-width="2" />
            <text x="40" y="60" text-anchor="middle" font-size="12" fill="#6B5F52" font-family="'DM Mono', monospace">A</text>
            <text x="110" y="60" text-anchor="middle" font-size="12" fill="#6B5F52" font-family="'DM Mono', monospace">B</text>
            <text x="180" y="60" text-anchor="middle" font-size="12" fill="#6B5F52" font-family="'DM Mono', monospace">C</text>
          </svg>
          <div class="empty-note">Enter some edges above and press Analyze</div>
        </div>
      </div>

      <div id="errorState" class="error-state" role="alert">
        <div class="error-icon">⚠</div>
        <div class="error-title">Analysis Failed</div>
        <div class="error-sub" id="errorSub">Request failed.</div>
        <button class="btn btn-secondary" id="retryBtn" type="button" style="border-color: var(--accent-red); color: var(--accent-red);">Try again</button>
      </div>

      <div id="resultContent" class="result-content">
        <div class="stats">
          <article class="stat-card" style="animation-delay: 0ms;">
            <p class="stat-value value-green" id="treesValue">0</p>
            <div class="stat-label">Total Trees</div>
          </article>
          <article class="stat-card" style="animation-delay: 80ms;">
            <p class="stat-value value-red" id="cyclesValue">0</p>
            <div class="stat-label">Total Cycles</div>
          </article>
          <article class="stat-card" style="animation-delay: 160ms;">
            <p class="stat-value value-blue" id="rootValue">—</p>
            <div class="stat-label">Deepest Root</div>
          </article>
        </div>

        <div class="hierarchy-row" id="hierarchyRow"></div>

        <div class="viz-wrap" id="vizWrap">
          <div class="depth-pill" id="depthPill" style="display: none;"></div>
          <div id="vizHost"></div>
        </div>

        <div class="section-head">— Invalid Entries</div>
        <div class="pill-row" id="invalidRow"></div>

        <div class="section-head">— Duplicate Edges</div>
        <div class="pill-row" id="duplicateRow"></div>

        <div class="json-toggle-row">
          <button class="json-toggle" id="jsonToggle" type="button">▶ Raw Response</button>
        </div>
        <div class="json-panel" id="jsonPanel">
          <button class="json-copy" id="copyBtn" type="button">Copy JSON</button>
          <div class="json-content" id="jsonContent"></div>
        </div>
      </div>
    </section>
  </div>

  <div class="modal" id="bulkModal" aria-hidden="true">
    <div class="modal-card">
      <h3 class="modal-title">Paste comma/newline separated edges</h3>
      <textarea class="bulk-textarea" id="bulkInput" placeholder="A->B, A->C&#10;B->D"></textarea>
      <div class="modal-actions">
        <button class="btn" id="bulkCancel" type="button">Close</button>
        <button class="btn btn-submit" id="bulkAdd" type="button" style="margin-left: 0;">Add all</button>
      </div>
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script>
    const API_BASE = window.location.hostname === 'localhost'
      ? 'http://localhost:3000'
      : '/api';

    async function analyze(entries) {
      const res = await fetch(`${API_BASE}/bfhl`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: entries })
      });
      if (!res.ok) throw new Error(`API error ${res.status}`);
      return res.json();
    }

    const EDGE_PATTERN = /^[A-Z]->[A-Z]$/;
    const NODE_RADIUS = 22;
    const NODE_V_SPACING = 80;
    const NODE_H_SPACING = 60;

    const edgeInput = document.getElementById('edgeInput');
    const chipArea = document.getElementById('chipArea');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const pasteBtn = document.getElementById('pasteBtn');
    const clearBtn = document.getElementById('clearBtn');

    const emptyState = document.getElementById('emptyState');
    const resultContent = document.getElementById('resultContent');
    const errorState = document.getElementById('errorState');
    const errorSub = document.getElementById('errorSub');
    const retryBtn = document.getElementById('retryBtn');

    const treesValue = document.getElementById('treesValue');
    const cyclesValue = document.getElementById('cyclesValue');
    const rootValue = document.getElementById('rootValue');

    const hierarchyRow = document.getElementById('hierarchyRow');
    const vizHost = document.getElementById('vizHost');
    const depthPill = document.getElementById('depthPill');

    const invalidRow = document.getElementById('invalidRow');
    const duplicateRow = document.getElementById('duplicateRow');

    const jsonToggle = document.getElementById('jsonToggle');
    const jsonPanel = document.getElementById('jsonPanel');
    const jsonContent = document.getElementById('jsonContent');
    const copyBtn = document.getElementById('copyBtn');

    const bulkModal = document.getElementById('bulkModal');
    const bulkInput = document.getElementById('bulkInput');
    const bulkAdd = document.getElementById('bulkAdd');
    const bulkCancel = document.getElementById('bulkCancel');

    const tooltip = document.getElementById('tooltip');

    let chips = [];
    let responseData = null;
    let selectedHierarchyIndex = 0;
    let hasSubmitted = false;

    function normalizeEntry(raw) {
      let v = String(raw || '').trim();
      v = v.replace(/^\+['"]|\+['"]$/g, '');
      while (/^[\s"'“”‘’`\[\]\(\)\{\}]+/.test(v) || /[\s"'“”‘’`\[\]\(\)\{\}]+$/.test(v)) {
        v = v
          .replace(/^[\s"'“”‘’`\[\]\(\)\{\}]+/, '')
          .replace(/[\s"'“”‘’`\[\]\(\)\{\}]+$/, '');
      }
      return v;
    }

    function getInvalidReason(entry) {
      const normalized = normalizeEntry(entry);
      if (normalized.trim() === '') return 'Empty string';
      if (!/->/.test(normalized)) return 'Missing -> separator';
      const parts = normalized.split('->');
      const left = parts[0] || '';
      const right = parts[1] || '';
      if (!right) return 'Missing child node';
      if (left.length !== 1 || right.length !== 1) return 'Nodes must be single letters';
      if (!/[A-Z]/.test(left) || !/[A-Z]/.test(right)) return 'Must be uppercase A–Z';
      if (left === right) return 'Self-loop not allowed';
      return 'Invalid format';
    }

    function classifyChip(value, index) {
      const normalized = normalizeEntry(value).trim();
      if (!EDGE_PATTERN.test(normalized)) return 'invalid';
      const [left, right] = normalized.split('->');
      if (left === right) return 'invalid';
      const first = chips.findIndex((chip) => normalizeEntry(chip).trim() === normalized);
      if (first !== -1 && first !== index) return 'duplicate';
      return 'valid';
    }

    function updateAnalyzeButton() {
      analyzeBtn.disabled = chips.length === 0;
    }

    function createChipNode(value, index) {
      const status = classifyChip(value, index);
      const chip = document.createElement('span');
      chip.className = `chip chip-${status}`;

      const txt = document.createElement('span');
      txt.textContent = value;
      chip.appendChild(txt);

      const close = document.createElement('button');
      close.className = 'chip-remove';
      close.type = 'button';
      close.textContent = '×';
      close.setAttribute('aria-label', `Remove ${value}`);
      close.addEventListener('click', () => {
        chips.splice(index, 1);
        renderChips();
      });
      chip.appendChild(close);

      if (status === 'invalid') {
        chip.title = getInvalidReason(value);
      } else if (status === 'duplicate') {
        chip.title = 'Potential duplicate';
      } else {
        chip.title = 'Valid-looking edge';
      }

      return chip;
    }

    function renderChips() {
      chipArea.querySelectorAll('.chip').forEach((el) => el.remove());
      chips.forEach((chip, idx) => {
        chipArea.insertBefore(createChipNode(chip, idx), edgeInput);
      });
      updateAnalyzeButton();
    }

    function addChip(raw) {
      const normalized = normalizeEntry(raw);
      if (!normalized) return;
      chips.push(normalized);
      renderChips();
    }

    function parseBulkInput(text) {
      const source = String(text || '').trim();
      if (!source) return [];
      if (source.startsWith('[') && source.endsWith(']')) {
        try {
          const parsed = JSON.parse(source);
          if (Array.isArray(parsed)) {
            return parsed.map((x) => normalizeEntry(x)).filter(Boolean);
          }
        } catch (_err) {
          // Fall through to split parsing.
        }
      }
      return source
        .split(/[\n,;]/)
        .map((part) => normalizeEntry(part))
        .filter(Boolean);
    }

    function setLoading(isLoading) {
      if (isLoading) {
        analyzeBtn.disabled = true;
        analyzeBtn.textContent = '';
        const sp = document.createElement('span');
        sp.className = 'spinner';
        const t = document.createElement('span');
        t.textContent = 'Analyzing...';
        analyzeBtn.appendChild(sp);
        analyzeBtn.appendChild(t);
      } else {
        analyzeBtn.textContent = 'Analyze →';
        updateAnalyzeButton();
      }
    }

    function showState(type) {
      emptyState.style.display = type === 'empty' ? 'grid' : 'none';
      resultContent.style.display = type === 'result' ? 'block' : 'none';
      errorState.style.display = type === 'error' ? 'block' : 'none';
    }

    function animateCount(el, target) {
      const start = 0;
      const duration = 600;
      const t0 = performance.now();

      function frame(now) {
        const p = Math.min(1, (now - t0) / duration);
        const current = Math.round(start + (target - start) * (1 - Math.pow(1 - p, 3)));
        el.textContent = String(current);
        if (p < 1) requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    }

    function buildTreeModel(label, subtree, level) {
      const entries = Object.entries(subtree || {});
      const node = {
        label,
        level,
        children: entries.map(([childLabel, childTree]) => buildTreeModel(childLabel, childTree, level + 1)),
        x: 0,
        y: 0,
        widthUnits: 1
      };
      return node;
    }

    function postOrderLayout(node, cursorRef) {
      if (!node.children.length) {
        node.widthUnits = 1;
        node.x = cursorRef.value;
        cursorRef.value += 1;
        return;
      }

      node.children.forEach((child) => postOrderLayout(child, cursorRef));
      const first = node.children[0].x;
      const last = node.children[node.children.length - 1].x;
      node.x = (first + last) / 2;
      node.widthUnits = node.children.reduce((acc, child) => acc + child.widthUnits, 0);
    }

    function collectNodesBfs(root) {
      const order = [];
      const queue = [root];
      while (queue.length) {
        const n = queue.shift();
        order.push(n);
        n.children.forEach((c) => queue.push(c));
      }
      return order;
    }

    function collectEdges(root) {
      const edges = [];
      const stack = [root];
      while (stack.length) {
        const n = stack.pop();
        n.children.forEach((c) => {
          edges.push([n, c]);
          stack.push(c);
        });
      }
      return edges;
    }

    function layoutTree(root, childrenMap) {
      const model = buildTreeModel(root, childrenMap || {}, 0);
      postOrderLayout(model, { value: 0 });
      return model;
    }

    function renderTreeHierarchy(hierarchy) {
      const rootEntry = Object.entries(hierarchy.tree || {})[0];
      if (!rootEntry) {
        vizHost.textContent = 'No tree data available.';
        return;
      }

      const [rootLabel, rootMap] = rootEntry;
      const model = layoutTree(rootLabel, rootMap);
      const nodes = collectNodesBfs(model);
      const edges = collectEdges(model);

      const maxLevel = Math.max(...nodes.map((n) => n.level));
      const minX = Math.min(...nodes.map((n) => n.x));
      const maxX = Math.max(...nodes.map((n) => n.x));

      const width = Math.max(300, (maxX - minX + 1) * NODE_H_SPACING + NODE_RADIUS * 4);
      const height = Math.max(200, (maxLevel + 1) * NODE_V_SPACING + NODE_RADIUS * 3);

      const offsetX = NODE_RADIUS * 2 - minX * NODE_H_SPACING;
      const offsetY = NODE_RADIUS * 1.8;

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('class', 'viz-svg');
      svg.setAttribute('viewBox', `0 0 ${width} ${height}`);
      svg.setAttribute('width', '100%');
      svg.setAttribute('height', String(height));

      const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
      const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
      marker.setAttribute('id', 'edgeArrow');
      marker.setAttribute('markerWidth', '8');
      marker.setAttribute('markerHeight', '8');
      marker.setAttribute('refX', '6');
      marker.setAttribute('refY', '4');
      marker.setAttribute('orient', 'auto');
      const markerPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      markerPath.setAttribute('d', 'M0,0 L8,4 L0,8 Z');
      markerPath.setAttribute('fill', 'var(--edge-stroke)');
      marker.appendChild(markerPath);
      defs.appendChild(marker);
      svg.appendChild(defs);

      const posX = (n) => n.x * NODE_H_SPACING + offsetX;
      const posY = (n) => n.level * NODE_V_SPACING + offsetY;

      edges.forEach(([from, to], i) => {
        const sx = posX(from);
        const sy = posY(from) + NODE_RADIUS;
        const tx = posX(to);
        const ty = posY(to) - NODE_RADIUS;
        const cy = (sy + ty) / 2;
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', `M ${sx} ${sy} Q ${(sx + tx) / 2} ${cy} ${tx} ${ty}`);
        path.setAttribute('stroke', 'var(--edge-stroke)');
        path.setAttribute('stroke-width', '1.5');
        path.setAttribute('fill', 'none');
        path.setAttribute('marker-end', 'url(#edgeArrow)');
        svg.appendChild(path);

        const length = path.getTotalLength();
        path.style.strokeDasharray = String(length);
        path.style.strokeDashoffset = String(length);
        path.style.animation = `drawEdge 300ms ease ${i * 45}ms forwards`;
      });

      nodes.forEach((node, i) => {
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.style.opacity = '0';
        g.style.animation = `fadeIn 260ms ease ${i * 50}ms forwards`;

        const cx = posX(node);
        const cy = posY(node);

        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', String(cx));
        circle.setAttribute('cy', String(cy));
        circle.setAttribute('r', String(NODE_RADIUS));
        circle.setAttribute('fill', node.children.length ? 'var(--node-fill)' : 'var(--accent-blue-bg)');
        circle.setAttribute('stroke', node.label === hierarchy.root ? 'var(--node-root)' : 'var(--node-stroke)');
        circle.setAttribute('stroke-width', node.label === hierarchy.root ? '3' : '2');
        if (node.label === hierarchy.root) {
          circle.style.filter = 'drop-shadow(0 0 6px rgba(29,62,107,0.25))';
        }

        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', String(cx));
        text.setAttribute('y', String(cy + 4));
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('font-family', 'DM Mono');
        text.setAttribute('font-size', '13');
        text.setAttribute('fill', 'var(--ink)');
        text.textContent = node.label;

        g.addEventListener('mouseenter', (evt) => {
          circle.setAttribute('fill', 'var(--accent-blue-bg)');
          tooltip.textContent = `Node ${node.label} · Level ${node.level + 1}`;
          tooltip.style.left = `${evt.clientX + 12}px`;
          tooltip.style.top = `${evt.clientY + 10}px`;
          tooltip.classList.add('show');
        });
        g.addEventListener('mousemove', (evt) => {
          tooltip.style.left = `${evt.clientX + 12}px`;
          tooltip.style.top = `${evt.clientY + 10}px`;
        });
        g.addEventListener('mouseleave', () => {
          circle.setAttribute('fill', node.children.length ? 'var(--node-fill)' : 'var(--accent-blue-bg)');
          tooltip.classList.remove('show');
        });

        g.appendChild(circle);
        g.appendChild(text);
        svg.appendChild(g);
      });

      vizHost.replaceChildren(svg);
      depthPill.style.display = 'inline-flex';
      depthPill.textContent = `depth: ${hierarchy.depth}`;
    }

    function getCycleNodes(rootLabel) {
      const valid = [];
      const parentOf = new Map();

      chips.forEach((entry) => {
        const val = normalizeEntry(entry);
        if (!EDGE_PATTERN.test(val)) return;
        const [p, c] = val.split('->');
        if (p === c) return;
        valid.push({ p, c });
      });

      const seenEdge = new Set();
      const dedup = [];
      valid.forEach((e) => {
        const key = `${e.p}->${e.c}`;
        if (!seenEdge.has(key)) {
          seenEdge.add(key);
          dedup.push(e);
        }
      });

      const kept = [];
      dedup.forEach((e) => {
        if (parentOf.has(e.c)) return;
        parentOf.set(e.c, e.p);
        kept.push(e);
      });

      const graph = new Map();
      function ensure(node) {
        if (!graph.has(node)) graph.set(node, new Set());
      }
      kept.forEach((e) => {
        ensure(e.p);
        ensure(e.c);
        graph.get(e.p).add(e.c);
        graph.get(e.c).add(e.p);
      });

      const out = [];
      const q = [rootLabel];
      const vis = new Set([rootLabel]);
      while (q.length) {
        const n = q.shift();
        out.push(n);
        (graph.get(n) || []).forEach((nx) => {
          if (vis.has(nx)) return;
          vis.add(nx);
          q.push(nx);
        });
      }

      return out.length ? out.sort() : [rootLabel];
    }

    function renderCycleHierarchy(hierarchy) {
      const nodes = getCycleNodes(hierarchy.root);
      const size = 360;
      const cx = size / 2;
      const cy = size / 2;
      const radius = Math.max(70, Math.min(120, 24 * nodes.length));

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('class', 'viz-svg');
      svg.setAttribute('viewBox', `0 0 ${size} ${size}`);
      svg.setAttribute('width', '100%');
      svg.setAttribute('height', String(size));

      const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
      const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
      marker.setAttribute('id', 'cycleArrow');
      marker.setAttribute('markerWidth', '8');
      marker.setAttribute('markerHeight', '8');
      marker.setAttribute('refX', '6');
      marker.setAttribute('refY', '4');
      marker.setAttribute('orient', 'auto');
      const markerPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      markerPath.setAttribute('d', 'M0,0 L8,4 L0,8 Z');
      markerPath.setAttribute('fill', 'var(--node-cycle)');
      marker.appendChild(markerPath);
      defs.appendChild(marker);
      svg.appendChild(defs);

      const pos = nodes.map((label, idx) => {
        const a = (Math.PI * 2 * idx) / nodes.length - Math.PI / 2;
        return { label, x: cx + Math.cos(a) * radius, y: cy + Math.sin(a) * radius };
      });

      pos.forEach((p, i) => {
        const next = pos[(i + 1) % pos.length];
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        const mx = (p.x + next.x) / 2;
        const my = (p.y + next.y) / 2;
        const bendX = mx + (mx - cx) * 0.18;
        const bendY = my + (my - cy) * 0.18;
        path.setAttribute('d', `M ${p.x} ${p.y} Q ${bendX} ${bendY} ${next.x} ${next.y}`);
        path.setAttribute('stroke', 'var(--node-cycle)');
        path.setAttribute('stroke-width', '1.8');
        path.setAttribute('fill', 'none');
        path.setAttribute('marker-end', 'url(#cycleArrow)');
        svg.appendChild(path);
      });

      pos.forEach((p, i) => {
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.style.opacity = '0';
        g.style.animation = `fadeIn 260ms ease ${i * 50}ms forwards`;

        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', String(p.x));
        circle.setAttribute('cy', String(p.y));
        circle.setAttribute('r', String(NODE_RADIUS - 1));
        circle.setAttribute('fill', 'var(--accent-red-bg)');
        circle.setAttribute('stroke', 'var(--node-cycle)');
        circle.setAttribute('stroke-width', '2.3');

        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', String(p.x));
        text.setAttribute('y', String(p.y + 4));
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('font-family', 'DM Mono');
        text.setAttribute('font-size', '13');
        text.setAttribute('fill', 'var(--accent-red)');
        text.textContent = p.label;

        g.appendChild(circle);
        g.appendChild(text);
        svg.appendChild(g);
      });

      const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      label.setAttribute('x', String(cx));
      label.setAttribute('y', String(cy + 6));
      label.setAttribute('text-anchor', 'middle');
      label.setAttribute('font-family', 'DM Serif Display');
      label.setAttribute('font-size', '24');
      label.setAttribute('fill', 'var(--accent-red)');
      label.textContent = '↺ cycle';
      svg.appendChild(label);

      vizHost.replaceChildren(svg);
      depthPill.style.display = 'none';
    }

    function renderHierarchyCards(hierarchies) {
      hierarchyRow.replaceChildren();
      hierarchies.forEach((h, idx) => {
        const card = document.createElement('button');
        card.type = 'button';
        card.className = `hier-card ${h.has_cycle ? 'cycle' : ''} ${idx === selectedHierarchyIndex ? 'selected' : ''}`;

        const root = document.createElement('p');
        root.className = 'hier-root';
        root.textContent = `Root: ${h.root}`;

        const meta = document.createElement('div');
        meta.className = 'hier-meta';
        if (h.has_cycle) {
          const badge = document.createElement('span');
          badge.className = 'cycle-badge-small';
          badge.textContent = '↺ CYCLE';
          meta.appendChild(badge);
        } else {
          const dot = document.createElement('span');
          dot.textContent = '● Tree';
          const depth = document.createElement('span');
          depth.textContent = `depth: ${h.depth}`;
          meta.appendChild(dot);
          meta.appendChild(depth);
        }

        card.appendChild(root);
        card.appendChild(meta);

        card.addEventListener('click', () => {
          selectedHierarchyIndex = idx;
          renderHierarchyCards(hierarchies);
          renderSelectedHierarchy();
        });

        hierarchyRow.appendChild(card);
      });
    }

    function renderSelectedHierarchy() {
      if (!responseData || !Array.isArray(responseData.hierarchies) || !responseData.hierarchies.length) {
        vizHost.textContent = 'No hierarchy selected.';
        depthPill.style.display = 'none';
        return;
      }

      const selected = responseData.hierarchies[selectedHierarchyIndex];
      if (!selected) return;

      if (selected.has_cycle) {
        renderCycleHierarchy(selected);
      } else {
        renderTreeHierarchy(selected);
      }
    }

    function renderPillRow(container, values, kind) {
      container.replaceChildren();
      if (!values.length) {
        const none = document.createElement('span');
        none.style.color = 'var(--ink-faint)';
        none.style.fontSize = 'var(--text-sm)';
        none.textContent = 'None';
        container.appendChild(none);
        return;
      }

      values.forEach((value) => {
        const pill = document.createElement('span');
        pill.className = `pill ${kind === 'invalid' ? 'pill-invalid' : 'pill-duplicate'}`;
        pill.textContent = value;
        if (kind === 'invalid') {
          pill.title = getInvalidReason(value);
        } else {
          pill.title = 'Duplicate edge';
        }
        container.appendChild(pill);
      });
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function highlightJSON(json) {
      const escaped = escapeHtml(json);
      return escaped
        .replace(/"([^"\\]|\\.)+"\s*:/g, (m) => `<span class="json-key">${m}</span>`)
        .replace(/:\s*"([^"\\]|\\.)*"/g, (m) => `: <span class="json-string">${m.slice(2)}</span>`)
        .replace(/:\s*(-?\d+(?:\.\d+)?)/g, ': <span class="json-number">$1</span>')
        .replace(/:\s*(true|false)/g, ': <span class="json-bool">$1</span>');
    }

    function renderJSONPanel(data) {
      const json = JSON.stringify(data, null, 2);
      jsonContent.innerHTML = highlightJSON(json);
    }

    function renderSummary(summary) {
      animateCount(treesValue, Number(summary.total_trees || 0));
      animateCount(cyclesValue, Number(summary.total_cycles || 0));
      rootValue.textContent = summary.largest_tree_root || '—';
    }

    function renderResult(data) {
      responseData = data;
      selectedHierarchyIndex = 0;

      renderSummary(data.summary || {});
      renderHierarchyCards(data.hierarchies || []);
      renderSelectedHierarchy();
      renderPillRow(invalidRow, data.invalid_entries || [], 'invalid');
      renderPillRow(duplicateRow, data.duplicate_edges || [], 'duplicate');
      renderJSONPanel(data);

      if (!jsonPanel.style.display || jsonPanel.style.display === 'none') {
        jsonToggle.textContent = '▶ Raw Response';
      }

      showState('result');
    }

    function renderError(message) {
      errorSub.textContent = message;
      showState('error');
    }

    function clearAll() {
      chips = [];
      responseData = null;
      selectedHierarchyIndex = 0;
      hasSubmitted = false;
      renderChips();
      showState('empty');
      treesValue.textContent = '0';
      cyclesValue.textContent = '0';
      rootValue.textContent = '—';
      hierarchyRow.replaceChildren();
      vizHost.replaceChildren();
      invalidRow.replaceChildren();
      duplicateRow.replaceChildren();
      jsonContent.textContent = '';
      jsonPanel.style.display = 'none';
      jsonToggle.textContent = '▶ Raw Response';
    }

    async function submit() {
      if (!chips.length) return;

      hasSubmitted = true;
      setLoading(true);

      try {
        const data = await analyze(chips.slice());

        if (!data || !Array.isArray(data.hierarchies) || !data.summary) {
          renderError('Malformed API response received.');
          return;
        }

        renderResult(data);
      } catch (err) {
        const msg = err && err.message ? err.message : 'Unknown network error';
        renderError(`Unable to complete analysis. ${msg}`);
      } finally {
        setLoading(false);
      }
    }

    edgeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ',') {
        e.preventDefault();
        if (edgeInput.value.trim()) addChip(edgeInput.value);
        edgeInput.value = '';
      }
    });

    edgeInput.addEventListener('blur', () => {
      if (!edgeInput.value.trim()) return;
      addChip(edgeInput.value);
      edgeInput.value = '';
    });

    analyzeBtn.addEventListener('click', submit);

    retryBtn.addEventListener('click', () => {
      if (hasSubmitted) submit();
    });

    clearBtn.addEventListener('click', clearAll);

    pasteBtn.addEventListener('click', () => {
      bulkModal.classList.add('open');
      bulkModal.setAttribute('aria-hidden', 'false');
      bulkInput.focus();
    });

    bulkCancel.addEventListener('click', () => {
      bulkModal.classList.remove('open');
      bulkModal.setAttribute('aria-hidden', 'true');
      bulkInput.value = '';
    });

    bulkAdd.addEventListener('click', () => {
      parseBulkInput(bulkInput.value).forEach(addChip);
      bulkModal.classList.remove('open');
      bulkModal.setAttribute('aria-hidden', 'true');
      bulkInput.value = '';
    });

    bulkModal.addEventListener('click', (e) => {
      if (e.target === bulkModal) {
        bulkModal.classList.remove('open');
        bulkModal.setAttribute('aria-hidden', 'true');
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && bulkModal.classList.contains('open')) {
        bulkModal.classList.remove('open');
        bulkModal.setAttribute('aria-hidden', 'true');
      }
    });

    jsonToggle.addEventListener('click', () => {
      const open = jsonPanel.style.display === 'block';
      jsonPanel.style.display = open ? 'none' : 'block';
      jsonToggle.textContent = open ? '▶ Raw Response' : '▼ Raw Response';
    });

    copyBtn.addEventListener('click', async () => {
      if (!responseData) return;
      try {
        await navigator.clipboard.writeText(JSON.stringify(responseData, null, 2));
        copyBtn.textContent = '✓ Copied';
        setTimeout(() => {
          copyBtn.textContent = 'Copy JSON';
        }, 2000);
      } catch (_err) {
        copyBtn.textContent = 'Copy failed';
        setTimeout(() => {
          copyBtn.textContent = 'Copy JSON';
        }, 2000);
      }
    });

    showState('empty');
    renderChips();

  </script>
</body>
</html>
